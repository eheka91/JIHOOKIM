<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>우리 가족 앨범</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#FDF8F3;--brown:#5C3D2E;--accent:#C4855A;
  --accent-light:#F0DDD0;--muted:#9B7B6A;--border:#E8DDD0;
  --text:#3D2B1F;--sub:#7A5A48;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans KR',sans-serif;background:var(--cream);color:var(--text);min-height:100vh}
header{position:sticky;top:0;z-index:50;background:rgba(253,248,243,0.96);backdrop-filter:blur(10px);border-bottom:0.5px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between}
.logo{font-size:18px;font-weight:700;color:var(--brown);letter-spacing:-0.4px}
.logo span{color:var(--accent)}
.status{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:5px}
.dot{width:7px;height:7px;border-radius:50%;background:#ccc;display:inline-block;transition:background 0.3s}
.dot.ok{background:#7DB87D}.dot.err{background:#E57373}
.hero{padding:28px 20px 16px}
.hero h1{font-size:24px;font-weight:700;letter-spacing:-0.5px;margin-bottom:4px}
.hero p{font-size:13px;color:var(--muted)}
.filter-wrap{padding:0 20px 16px;overflow-x:auto;white-space:nowrap;scrollbar-width:none}
.filter-wrap::-webkit-scrollbar{display:none}
.pills{display:inline-flex;gap:7px}
.pill{padding:6px 14px;border:0.5px solid var(--border);border-radius:20px;font-size:12px;font-weight:500;color:var(--sub);background:var(--cream);cursor:pointer;transition:all 0.15s}
.pill:hover{border-color:var(--accent);color:var(--accent)}
.pill.on{background:var(--accent);color:#fff;border-color:var(--accent)}
main{padding-bottom:60px}
.state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;gap:14px;text-align:center}
.state p{font-size:14px;color:var(--muted);line-height:1.7;max-width:280px}
.spin{width:32px;height:32px;border:3px solid var(--accent-light);border-top-color:var(--accent);border-radius:50%;animation:spin 0.75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.sec{margin-bottom:4px}
.sec-hdr{display:flex;align-items:baseline;gap:8px;padding:20px 20px 10px}
.sec-date{font-size:14px;font-weight:700;color:var(--text)}
.sec-cnt{font-size:11px;color:var(--muted)}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px}
.cell{aspect-ratio:1;overflow:hidden;position:relative;cursor:pointer;background:var(--accent-light)}
.cell img,.cell video{width:100%;height:100%;object-fit:cover;display:block;transition:opacity 0.2s}
.cell:hover img,.cell:hover video{opacity:0.82}
.vbadge{position:absolute;bottom:5px;left:6px;background:rgba(0,0,0,0.52);color:#fff;font-size:9px;padding:2px 6px;border-radius:8px}
.divider{height:0.5px;background:var(--border);margin:4px 0}
/* Lightbox */
.lb{display:none;position:fixed;inset:0;z-index:200;background:rgba(15,8,4,0.93);flex-direction:column;align-items:center;justify-content:center}
.lb.open{display:flex}
.lb-top{position:absolute;top:0;left:0;right:0;padding:14px 18px;display:flex;justify-content:space-between;align-items:center}
.lb-name{color:rgba(255,255,255,0.65);font-size:13px;max-width:72%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lb-x{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.13);border:none;color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.15s}
.lb-x:hover{background:rgba(255,255,255,0.25)}
.lb-wrap{max-width:min(92vw,860px);max-height:76vh;display:flex;align-items:center;justify-content:center}
.lb-wrap img,.lb-wrap video{max-width:100%;max-height:76vh;border-radius:6px;display:block}
.lb-bot{position:absolute;bottom:0;left:0;right:0;padding:14px;text-align:center;color:rgba(255,255,255,0.45);font-size:12px}
.lb-btn{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,0.13);border:none;color:#fff;font-size:26px;cursor:pointer;width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:background 0.15s}
.lb-btn:hover{background:rgba(255,255,255,0.25)}
.lb-prev{left:14px}.lb-next{right:14px}
@media(min-width:540px){.grid{grid-template-columns:repeat(4,1fr)}}
@media(min-width:800px){.grid{grid-template-columns:repeat(5,1fr)};header{padding:16px 32px};.hero{padding:36px 32px 20px};.filter-wrap{padding:0 32px 18px};.sec-hdr{padding:20px 32px 10px}}
</style>
</head>
<body>
<header>
  <div class="logo">우리 가족 <span>앨범</span></div>
  <div class="status"><span class="dot" id="dot"></span><span id="stxt">불러오는 중...</span></div>
</header>
<div class="hero">
  <h1>소중한 순간들 📷</h1>
  <p id="hsub">가장 최근 업로드된 10개의 추억</p>
</div>
<div class="filter-wrap"><div class="pills" id="pills"><button class="pill on" data-m="all">전체</button></div></div>
<main id="main"><div class="state"><div class="spin"></div><p>사진을 구성하고 있습니다...</p></div></main>

<div class="lb" id="lb">
  <div class="lb-top">
    <span class="lb-name" id="lbname"></span>
    <button class="lb-x" onclick="closeLb()">✕</button>
  </div>
  <button class="lb-btn lb-prev" onclick="nav(-1)">&#8249;</button>
  <div class="lb-wrap" id="lbwrap"></div>
  <button class="lb-btn lb-next" onclick="nav(1)">&#8250;</button>
  <div class="lb-bot" id="lbbot"></div>
</div>

</html>
